version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: alquilersano_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alquiler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alquiler}
      POSTGRES_DB: ${POSTGRES_DB:-alquilersano}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alquiler}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: alquilersano_backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: alquilersano_frontend
    env_file: .env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
