# Render Blueprint — AlquilerSano backend
# Docs: https://render.com/docs/blueprint-spec
#
# Despliegue:
#   1. Conectar este repositorio en render.com
#   2. Render detecta este fichero y crea los servicios automáticamente
#   3. Configurar manualmente en Render las env vars marcadas como "sync: false"

services:
  - type: web
    name: alquilersano-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter          # cambiar a "standard" en producción real
    region: frankfurt      # más cercano a España
    branch: master
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false        # configurar manualmente en Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://alquilersano.vercel.app,https://alquilersano.es,https://frontend-6uiwrc40q-fabrizionbs-projects.vercel.app,https://frontend-fabrizionbs-projects.vercel.app,https://frontend-gamma-khaki-78.vercel.app"
      - key: DEBUG
        value: "false"

databases:
  - name: alquilersano-db
    plan: starter
    databaseName: alquilersano
    user: alquiler
    region: frankfurt
    postgresMajorVersion: 16
